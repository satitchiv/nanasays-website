const OUR_SLUGS = new Set(['clifton-college','millfield-school','oundle-school','wycombe-abbey','eton-college','harrow-school','wellington-college','tonbridge-school','haileybury','cheltenham-ladies-college','rugby-school','uppingham-school','sevenoaks-school','charterhouse-school','marlborough-college','radley-college','roedean-school','benenden-school','reeds-school-uk','loretto-school','rossall-school','epsom-college','wells-cathedral-school','st-leonards-school','kings-school-canterbury']);

let league = 'performance';
let seasonIdx = 0;

function seasons() { return league === 'performance' ? DATA.perf.seasons : DATA.all.seasons; }

function switchLeague(key) {
  league = key;
  seasonIdx = 0;
  document.getElementById('tab-perf').classList.toggle('active', key === 'performance');
  document.getElementById('tab-all').classList.toggle('active', key === 'all-comers');
  renderSeasonTabs();
  render();
}

function renderSeasonTabs() {
  document.getElementById('season-tabs').innerHTML = seasons().map((s,i) =>
    '<button class="stab ' + (i===seasonIdx?'active':'') + '" onclick="selectSeason(' + i + ')">' + s.season + (s.is_final?'':' ⚡') + '</button>'
  ).join('');
}

function selectSeason(i) { seasonIdx = i; renderSeasonTabs(); render(); }

function render() {
  const gender = document.getElementById('gender').value;
  const q = document.getElementById('search').value.toLowerCase();
  const season = seasons()[seasonIdx];
  const div = (season?.divisions||[]).find(d => d.age_level === gender);
  const rows = div?.rows || [];
  const filtered = q ? rows.filter(r => r.school_name.toLowerCase().includes(q)) : rows;

  document.getElementById('summary').textContent =
    filtered.length + ' schools' + (q ? ' matching "' + q + '"' : '') +
    ' — ' + (season?.season||'') + ' · ' + gender;

  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  if (!filtered.length) { tbody.innerHTML=''; empty.style.display=''; return; }
  empty.style.display = 'none';

  const maxPct = Math.max(...rows.map(r => parseFloat(r.win_pct)||0));

  tbody.innerHTML = filtered.map(r => {
    const pct = parseFloat(r.win_pct)||0;
    const fill = maxPct ? Math.round(pct/maxPct*100) : 0;
    const isOurs = OUR_SLUGS.has(r.school_slug);
    const rankHtml = r.rank===1 ? '<span class="badge b1">#1</span>' :
                     r.rank===2 ? '<span class="badge b2">#2</span>' :
                     r.rank===3 ? '<span class="badge b3">#3</span>' :
                     '<span class="rank">#' + r.rank + '</span>';
    return '<tr class="' + (isOurs?'ours':'') + '">' +
      '<td>' + rankHtml + (isOurs ? '<span class="badge bours">ours</span>' : '') + '</td>' +
      '<td>' + r.school_name + '</td>' +
      '<td class="r">' + (r.played??'—') + '</td>' +
      '<td class="r">' + (r.won??'—') + '</td>' +
      '<td class="r">' + (r.drawn??'—') + '</td>' +
      '<td class="r">' + (r.lost??'—') + '</td>' +
      '<td class="r">' + (r.goals_for??'—') + '</td>' +
      '<td class="r">' + (r.goals_against??'—') + '</td>' +
      '<td class="r">' + (r.goals_diff??'—') + '</td>' +
      '<td class="r">' + (r.league_points??'—') + '</td>' +
      '<td><span class="pct-val">' + (r.win_pct??'—') + '</span>' +
        '<div class="bar-wrap"><div class="bar" style="width:' + fill + '%"></div></div></td>' +
      '</tr>';
  }).join('');
}

renderSeasonTabs();
render();
</script>
