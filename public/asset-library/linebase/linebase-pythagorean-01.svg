<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <polygon points="180,250 320,250 320,350" fill="none" stroke="#1B3252" stroke-width="2"/>
  <polyline points="310,340 310,350 320,350" fill="none" stroke="#1B3252" stroke-width="2"/>
  <rect x="80" y="150" width="100" height="100" fill="#34C3A0" fill-opacity="0.35" stroke="#1B3252" stroke-width="1.5"/>
  <rect x="320" y="350" width="100" height="100" fill="#B08A3E" fill-opacity="0.35" stroke="#1B3252" stroke-width="1.5"/>
  <g transform="rotate(-35.5 250 300)">
    <rect x="180" y="300" width="172" height="172" fill="#1B3252" fill-opacity="0.25" stroke="#1B3252" stroke-width="1.5"/>
  </g>
  <g fill="#1B3252" font-family="Helvetica, Arial Black, sans-serif" font-weight="900" font-size="28">
    <text x="130" y="210" text-anchor="middle">a²</text>
    <text x="370" y="410" text-anchor="middle">b²</text>
  </g>
  <text x="180" y="445" text-anchor="middle" fill="#1B3252" font-family="Helvetica, Arial Black, sans-serif" font-weight="900" font-size="26">c²</text>
  <text x="250" y="90" text-anchor="middle" fill="#1B3252" font-family="Helvetica, Arial Black, sans-serif" font-weight="900" font-size="30">a² + b² = c²</text>
</svg>
