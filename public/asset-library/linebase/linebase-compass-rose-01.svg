<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Outer ring -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="#1B3252" stroke-width="1.2"/>
  <circle cx="250" cy="250" r="150" fill="none" stroke="#1B3252" stroke-width="0.8"/>
  <!-- Primary N/S/E/W points -->
  <g fill="#1B3252">
    <path d="M 250 250 L 240 90 L 250 70 L 260 90 Z"/>
    <path d="M 250 250 L 260 410 L 250 430 L 240 410 Z"/>
    <path d="M 250 250 L 410 240 L 430 250 L 410 260 Z"/>
    <path d="M 250 250 L 90 260 L 70 250 L 90 240 Z"/>
  </g>
  <!-- NE/NW/SE/SW intermediate points (smaller) -->
  <g fill="#1B3252" opacity="0.7">
    <path d="M 250 250 L 360 140 L 375 135 L 365 150 Z"/>
    <path d="M 250 250 L 140 140 L 125 135 L 135 150 Z"/>
    <path d="M 250 250 L 360 360 L 375 365 L 365 350 Z"/>
    <path d="M 250 250 L 140 360 L 125 365 L 135 350 Z"/>
  </g>
  <!-- Center hub -->
  <circle cx="250" cy="250" r="10" fill="#34C3A0"/>
  <!-- Cardinal letters -->
  <g fill="#1B3252" font-family="Helvetica, Arial Black, sans-serif" font-weight="900" font-size="20">
    <text x="250" y="58" text-anchor="middle">N</text>
    <text x="250" y="458" text-anchor="middle">S</text>
    <text x="445" y="257" text-anchor="middle">E</text>
    <text x="55" y="257" text-anchor="middle">W</text>
  </g>
</svg>
