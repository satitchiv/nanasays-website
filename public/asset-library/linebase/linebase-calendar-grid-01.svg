<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Header bar -->
  <rect x="50" y="70" width="400" height="40" fill="none" stroke="#1B3252" stroke-width="1.5"/>
  <!-- Day headers (M T W T F S S) -->
  <g fill="#1B3252" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="14">
    <text x="79" y="94" text-anchor="middle">M</text>
    <text x="136" y="94" text-anchor="middle">T</text>
    <text x="193" y="94" text-anchor="middle">W</text>
    <text x="250" y="94" text-anchor="middle">T</text>
    <text x="307" y="94" text-anchor="middle">F</text>
    <text x="364" y="94" text-anchor="middle">S</text>
    <text x="421" y="94" text-anchor="middle">S</text>
  </g>
  <!-- Date grid (5 weeks × 7 days) -->
  <g fill="none" stroke="#1B3252" stroke-width="1">
    <!-- 6 rows for calendar -->
    <g>
      <rect x="50" y="110" width="400" height="64"/>
      <rect x="50" y="174" width="400" height="64"/>
      <rect x="50" y="238" width="400" height="64"/>
      <rect x="50" y="302" width="400" height="64"/>
      <rect x="50" y="366" width="400" height="64"/>
    </g>
    <!-- Vertical dividers -->
    <line x1="107" y1="110" x2="107" y2="430"/>
    <line x1="164" y1="110" x2="164" y2="430"/>
    <line x1="221" y1="110" x2="221" y2="430"/>
    <line x1="279" y1="110" x2="279" y2="430"/>
    <line x1="336" y1="110" x2="336" y2="430"/>
    <line x1="393" y1="110" x2="393" y2="430"/>
  </g>
  <!-- One highlighted cell -->
  <rect x="193" y="238" width="57" height="64" fill="#34C3A0" opacity="0.45"/>
  <!-- Sample numbers -->
  <g fill="#1B3252" font-family="Helvetica, Arial, sans-serif" font-weight="600" font-size="13">
    <text x="79" y="130" text-anchor="middle">1</text>
    <text x="136" y="130" text-anchor="middle">2</text>
    <text x="193" y="130" text-anchor="middle">3</text>
    <text x="250" y="130" text-anchor="middle">4</text>
    <text x="307" y="130" text-anchor="middle">5</text>
    <text x="364" y="130" text-anchor="middle">6</text>
    <text x="421" y="130" text-anchor="middle">7</text>
    <text x="79" y="258" text-anchor="middle">15</text>
    <text x="136" y="258" text-anchor="middle">16</text>
    <text x="221" y="258" text-anchor="middle" fill="#1B3252" font-weight="800">17</text>
    <text x="279" y="258" text-anchor="middle">18</text>
    <text x="336" y="258" text-anchor="middle">19</text>
  </g>
</svg>
