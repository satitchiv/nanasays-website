<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Nested Fibonacci rectangles (thin grid) -->
  <g fill="none" stroke="#1B3252" stroke-width="0.8" opacity="0.35">
    <rect x="70" y="70" width="360" height="360"/>
    <rect x="70" y="70" width="223" height="223"/>
    <rect x="293" y="70" width="137" height="223"/>
    <rect x="293" y="208" width="85" height="85"/>
    <rect x="378" y="208" width="52" height="85"/>
    <rect x="378" y="260" width="52" height="33"/>
    <rect x="70" y="293" width="223" height="137"/>
    <rect x="70" y="293" width="137" height="137"/>
  </g>
  <!-- Spiral path through the rectangles -->
  <g fill="none" stroke="#1B3252" stroke-width="2.5" stroke-linecap="round">
    <path d="M 404 260
             A 26 26 0 0 1 378 234
             A 52 52 0 0 1 430 182
             A 85 85 0 0 1 345 97
             A 137 137 0 0 1 208 234
             A 223 223 0 0 1 431 11"/>
  </g>
  <!-- Central mark -->
  <circle cx="404" cy="260" r="5" fill="#34C3A0"/>
</svg>
