    <!-- Second step pattern below for depth -->
    <path d="M 30 470 L 80 470 L 80 445 L 130 445 L 130 420 L 180 420 L 180 395 L 230 395 L 230 370 L 280 370 L 280 345 L 330 345 L 330 320 L 380 320 L 380 295 L 430 295 L 430 270 L 480 270" opacity="0.4"/>
