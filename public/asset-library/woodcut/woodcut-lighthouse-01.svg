<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Ocean -->
  <g stroke="#34C3A0" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M 20 400 Q 100 395 200 400 Q 300 405 400 400 Q 460 397 490 400"/>
    <path d="M 20 420 Q 100 415 200 420 Q 300 425 400 420 Q 460 417 490 420"/>
    <path d="M 20 440 Q 100 435 200 440 Q 300 445 400 440 Q 460 437 490 440"/>
    <path d="M 20 460 Q 100 455 200 460 Q 300 465 400 460 Q 460 457 490 460"/>
    <path d="M 20 480 Q 100 475 200 480 Q 300 485 400 480 Q 460 477 490 480"/>
  </g>
  <!-- Rocky base -->
  <path d="M 180 400 L 200 360 L 230 340 L 280 340 L 320 360 L 340 400 Z" fill="#1B3252"/>
  <!-- Lighthouse tower tapered -->
  <path d="M 220 340 L 210 140 L 290 140 L 280 340 Z" fill="#FAF7F2" stroke="#1B3252" stroke-width="3"/>
  <!-- Red/navy stripes -->
  <path d="M 217 310 L 283 310 L 280 270 L 220 270 Z" fill="#B08A3E"/>
  <path d="M 215 230 L 285 230 L 282 190 L 218 190 Z" fill="#B08A3E"/>
  <!-- Gallery platform -->
  <rect x="200" y="135" width="100" height="12" fill="#1B3252"/>
  <!-- Light house top -->
  <rect x="215" y="95" width="70" height="40" fill="#FAF7F2" stroke="#1B3252" stroke-width="3"/>
  <!-- Light source -->
  <circle cx="250" cy="115" r="12" fill="#B08A3E"/>
  <!-- Light beams -->
  <g fill="#B08A3E" opacity="0.35">
    <path d="M 250 115 L 100 80 L 100 150 Z"/>
    <path d="M 250 115 L 400 80 L 400 150 Z"/>
  </g>
  <!-- Roof cone -->
  <path d="M 210 95 L 250 55 L 290 95 Z" fill="#1B3252"/>
  <!-- Lightning rod tip -->
  <line x1="250" y1="55" x2="250" y2="30" stroke="#1B3252" stroke-width="2.5"/>
  <circle cx="250" cy="28" r="4" fill="#B08A3E"/>
  <!-- Window in lighthouse body -->
  <rect x="240" y="255" width="20" height="28" fill="#34C3A0"/>
  <rect x="240" y="170" width="20" height="28" fill="#34C3A0"/>
</svg>
