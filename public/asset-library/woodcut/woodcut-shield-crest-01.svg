<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Ornamental top banner -->
  <rect x="130" y="85" width="240" height="32" fill="#B08A3E"/>
  <path d="M 130 117 L 115 140 L 145 117 Z" fill="#B08A3E"/>
  <path d="M 370 117 L 385 140 L 355 117 Z" fill="#B08A3E"/>
  <!-- Shield outline -->
  <path d="M 150 110 L 350 110 L 350 280 Q 350 385 250 445 Q 150 385 150 280 Z" fill="#1B3252"/>
  <!-- Lower half (teal) -->
  <path d="M 250 250 L 350 250 L 350 280 Q 350 385 250 445 Z" fill="#34C3A0"/>
  <path d="M 250 250 L 150 250 L 150 280 Q 150 385 250 445 Z" fill="#239C80"/>
  <!-- Cross shape center -->
  <g fill="#FAF7F2">
    <rect x="240" y="160" width="20" height="100"/>
    <rect x="200" y="190" width="100" height="20"/>
  </g>
  <!-- Small laurel sprigs below shield -->
  <g fill="#B08A3E" opacity="0.8">
    <ellipse cx="160" cy="380" rx="16" ry="7" transform="rotate(-55 160 380)"/>
    <ellipse cx="178" cy="410" rx="16" ry="7" transform="rotate(-65 178 410)"/>
    <ellipse cx="340" cy="380" rx="16" ry="7" transform="rotate(55 340 380)"/>
    <ellipse cx="322" cy="410" rx="16" ry="7" transform="rotate(65 322 410)"/>
  </g>
</svg>
