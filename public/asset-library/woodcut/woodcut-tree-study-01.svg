<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Ground -->
  <rect x="0" y="420" width="500" height="6" fill="#1B3252"/>
  <rect x="0" y="432" width="500" height="3" fill="#1B3252"/>

  <!-- Trunk -->
  <path d="M 230 420 L 225 250 Q 225 240 235 240 Q 260 240 260 250 L 268 420 Z" fill="#1B3252"/>

  <!-- Canopy mass (chunky blobs) -->
  <g fill="#1B3252">
    <ellipse cx="250" cy="200" rx="130" ry="90"/>
    <ellipse cx="170" cy="170" rx="55" ry="45"/>
    <ellipse cx="340" cy="170" rx="55" ry="45"/>
    <ellipse cx="200" cy="250" rx="45" ry="30"/>
    <ellipse cx="310" cy="250" rx="45" ry="30"/>
  </g>

  <!-- Light cutouts in canopy -->
  <g fill="#FAF7F2">
    <circle cx="200" cy="170" r="5"/>
    <circle cx="290" cy="190" r="4"/>
    <circle cx="340" cy="220" r="5"/>
    <circle cx="170" cy="210" r="4"/>
    <circle cx="230" cy="230" r="3"/>
  </g>

  <!-- Stack of books at base -->
  <rect x="290" y="395" width="80" height="20" fill="#34C3A0"/>
  <rect x="290" y="393" width="80" height="3" fill="#239C80"/>
  <rect x="298" y="375" width="70" height="20" fill="#1B3252"/>
  <rect x="305" y="355" width="60" height="20" fill="#B08A3E"/>
  <rect x="305" y="353" width="60" height="3" fill="#8B6A2E"/>
  <line x1="330" y1="403" x2="330" y2="413" stroke="#FAF7F2" stroke-width="1"/>
  <line x1="333" y1="383" x2="333" y2="393" stroke="#FAF7F2" stroke-width="1"/>
  <line x1="335" y1="363" x2="335" y2="373" stroke="#FAF7F2" stroke-width="1"/>

  <!-- Sun motif -->
  <circle cx="430" cy="90" r="22" fill="none" stroke="#1B3252" stroke-width="4"/>
  <g stroke="#1B3252" stroke-width="3" stroke-linecap="round">
    <line x1="430" y1="50" x2="430" y2="60"/>
    <line x1="460" y1="65" x2="454" y2="75"/>
    <line x1="400" y1="75" x2="406" y2="65"/>
    <line x1="468" y1="90" x2="460" y2="90"/>
    <line x1="392" y1="90" x2="400" y2="90"/>
  </g>

  <!-- Ground strokes -->
  <g fill="#1B3252">
    <rect x="50" y="440" width="70" height="4"/>
    <rect x="140" y="440" width="40" height="4"/>
    <rect x="190" y="444" width="50" height="3"/>
    <rect x="400" y="440" width="60" height="4"/>
  </g>
</svg>
