<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Figure silhouette -->
  <g fill="#1B3252">
    <circle cx="250" cy="180" r="42"/>
    <path d="M 170 470 L 195 260 Q 200 230 250 225 Q 300 230 305 260 L 330 470 Z"/>
    <path d="M 170 470 L 125 450 L 115 320 Q 125 290 175 275 Z"/>
    <path d="M 330 470 L 375 450 L 385 320 Q 375 290 325 275 Z"/>
    <!-- Mortarboard -->
    <path d="M 175 160 L 325 160 L 315 180 L 185 180 Z"/>
    <path d="M 175 160 L 325 160 L 320 150 L 180 150 Z"/>
  </g>

  <!-- Button on top -->
