<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Large central snowflake -->
  <g stroke="#1B3252" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="250" y1="150" x2="250" y2="350"/>
    <line x1="150" y1="250" x2="350" y2="250"/>
    <line x1="179" y1="179" x2="321" y2="321"/>
    <line x1="321" y1="179" x2="179" y2="321"/>
    <!-- Branching -->
    <line x1="250" y1="170" x2="240" y2="180"/>
    <line x1="250" y1="170" x2="260" y2="180"/>
    <line x1="250" y1="330" x2="240" y2="320"/>
    <line x1="250" y1="330" x2="260" y2="320"/>
    <line x1="170" y1="250" x2="180" y2="240"/>
    <line x1="170" y1="250" x2="180" y2="260"/>
    <line x1="330" y1="250" x2="320" y2="240"/>
    <line x1="330" y1="250" x2="320" y2="260"/>
  </g>
  <circle cx="250" cy="250" r="10" fill="#34C3A0"/>
  <!-- Medium snowflakes -->
  <g stroke="#1B3252" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- Top-left -->
    <g transform="translate(90 100)">
      <line x1="0" y1="-30" x2="0" y2="30"/>
      <line x1="-30" y1="0" x2="30" y2="0"/>
      <line x1="-21" y1="-21" x2="21" y2="21"/>
      <line x1="21" y1="-21" x2="-21" y2="21"/>
    </g>
    <!-- Top-right -->
    <g transform="translate(420 130)">
      <line x1="0" y1="-25" x2="0" y2="25"/>
      <line x1="-25" y1="0" x2="25" y2="0"/>
      <line x1="-18" y1="-18" x2="18" y2="18"/>
      <line x1="18" y1="-18" x2="-18" y2="18"/>
    </g>
    <!-- Bottom-left -->
    <g transform="translate(110 410)">
      <line x1="0" y1="-25" x2="0" y2="25"/>
      <line x1="-25" y1="0" x2="25" y2="0"/>
      <line x1="-18" y1="-18" x2="18" y2="18"/>
      <line x1="18" y1="-18" x2="-18" y2="18"/>
    </g>
    <!-- Bottom-right -->
    <g transform="translate(400 400)">
      <line x1="0" y1="-30" x2="0" y2="30"/>
      <line x1="-30" y1="0" x2="30" y2="0"/>
      <line x1="-21" y1="-21" x2="21" y2="21"/>
      <line x1="21" y1="-21" x2="-21" y2="21"/>
    </g>
  </g>
  <!-- Small snowflakes (just crosses) -->
  <g stroke="#1B3252" stroke-width="1.5" stroke-linecap="round">
    <g transform="translate(70 250)"><line x1="0" y1="-10" x2="0" y2="10"/><line x1="-10" y1="0" x2="10" y2="0"/></g>
    <g transform="translate(440 280)"><line x1="0" y1="-10" x2="0" y2="10"/><line x1="-10" y1="0" x2="10" y2="0"/></g>
    <g transform="translate(180 60)"><line x1="0" y1="-8" x2="0" y2="8"/><line x1="-8" y1="0" x2="8" y2="0"/></g>
    <g transform="translate(320 440)"><line x1="0" y1="-8" x2="0" y2="8"/><line x1="-8" y1="0" x2="8" y2="0"/></g>
  </g>
</svg>
